name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify versions match tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          CORE=$(node -p "require('./packages/core/package.json').version")
          UI=$(node -p "require('./packages/ui/package.json').version")
          if [[ "$TAG" != "$CORE" ]]; then
            echo "::error::Tag v$TAG does not match core package version $CORE"
            exit 1
          fi
          if [[ "$TAG" != "$UI" ]]; then
            echo "::error::Tag v$TAG does not match ui package version $UI"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test run
      - run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            pnpm --filter @geonovum/standards-checker publish --provenance --no-git-checks --tag beta
          else
            pnpm --filter @geonovum/standards-checker publish --provenance --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: |
          VERSION=$(node -p "require('./packages/ui/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            pnpm --filter @geonovum/standards-checker-ui publish --provenance --no-git-checks --tag beta
          else
            pnpm --filter @geonovum/standards-checker-ui publish --provenance --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
